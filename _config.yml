# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Om Anavekar
first_name: Om
last_name: Anavekar
email: anavekar.om@gmail.com
description: Engineer and tinkerer building at the intersection of hardware, software, and AI.
keywords: om, om-anavekar, anaveo, portfolio, hardware, software, embedded
lang: en
icon: Om_Favicon_32x32.png

url: https://anaveo.github.io
baseurl:

theme_default: dark

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  projects:
    output: true
    permalink: /projects/:name/

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages"]
exclude:
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - docker-compose-slim.yml
  - FAQ.md
  - Gemfile
  - Gemfile.lock
  - INSTALL.md
  - LICENSE
  - node_modules/
  - package.json
  - package-lock.json
  - purgecss.config.js
  - README.md
  - requirements.txt
  - _scripts/
  - _news/
  - _plugins/
  - docker-compose-slim.yml
keep_files:
  - CNAME
  - .nojekyll

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

sass:
  style: compressed

# Redirect Jekyll cache to Linux filesystem so WSL can write it
# (avoids NTFS permission errors when running bundle exec jekyll serve from WSL)
cache_dir: /tmp/.jekyll-cache-anaveo

defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false
